<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Task Tracker Kanban</title>
    <style>
      :root {
        color-scheme: light;
        --primary: #4f46e5;
        --primary-600: #4338ca;
        --bg: #f7f9fc;
        --panel: #ffffff;
        --panel-strong: rgba(79, 70, 229, 0.04);
        --text: #0f1724;
        --muted: #6b7280;
        --border: rgba(15, 23, 42, 0.06);
        --shadow-1: 0 6px 18px rgba(15,23,42,0.06);
        --shadow-2: 0 14px 30px rgba(15,23,42,0.08);
        --pill-high: #ffedf0;
        --pill-medium: #fff8ec;
        --pill-low: #ecfdf3;
        --pill-text: #111827;
        --error: #fff7f7;
        --error-border: #fecaca;
      }

      * { box-sizing: border-box; }

      html, body {
        margin: 0;
        min-height: 100%;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
        background: var(--bg);
        color: var(--text);
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      body { padding: 1.5rem 1rem 2rem; }

      .app-header {
        max-width: 1080px;
        margin: 0 auto 1.5rem;
        padding: 1.25rem 1.5rem;
        border-radius: 14px;
        display: flex;
        align-items: center;
        gap: 1rem;
        background: linear-gradient(180deg, rgba(79,46,229,0.03), rgba(79,46,229,0.01));
        border: 1px solid rgba(79,46,229,0.06);
        box-shadow: var(--shadow-1);
      }

      .app-header > div:first-child { flex: 1; }

      .app-header h1 { margin: 0 0 0.2rem; font-size: clamp(1.5rem, 2.2vw, 1.9rem); letter-spacing: -0.02em; }
      .app-header p { margin: 0; color: var(--muted); font-size: 0.95rem; }

      .new-task-btn {
        background: linear-gradient(90deg, var(--primary), var(--primary-600));
        color: #fff;
        border: none;
        padding: 0.6rem 1rem;
        border-radius: 12px;
        font-weight: 700;
        cursor: pointer;
        box-shadow: var(--shadow-1);
        transition: transform 120ms ease, box-shadow 120ms ease, opacity 120ms ease;
      }

      .new-task-btn:hover { transform: translateY(-2px); box-shadow: var(--shadow-2); opacity: 0.98; }

      .header-controls {
        display: flex;
        align-items: center;
        gap: 0.9rem;
        flex-wrap: wrap;
        justify-content: flex-end;
      }

      .overdue-filter {
        display: inline-flex;
        align-items: center;
        gap: 0.45rem;
        color: var(--text);
        font-size: 0.9rem;
        font-weight: 600;
      }

      .overdue-filter input {
        width: 1rem;
        height: 1rem;
        accent-color: var(--primary);
        cursor: pointer;
      }

      main { display: flex; justify-content: center; }

      .board { display: grid; gap: 1rem; max-width: 1080px; width: 100%; grid-template-columns: repeat(3, minmax(0, 1fr)); }
      @media (max-width: 960px) { .board { grid-template-columns: 1fr; } }

      .column {
        display: flex; flex-direction: column; gap: 0.75rem; padding: 1rem;
        border: 1px solid rgba(15,23,42,0.03); border-radius: 12px;
        background: linear-gradient(180deg, #ffffff, #fbfdff);
        box-shadow: 0 6px 18px rgba(12,17,31,0.04); min-height: 420px;
      }

      .column-header { display:flex; align-items:center; justify-content:space-between; gap:0.75rem; padding-bottom:0.5rem; border-bottom: 1px solid rgba(15,23,42,0.03); }
      .column-header h2 { margin:0; font-size:1rem; font-weight:700; }
      .column-count { color:var(--muted); font-size:0.85rem; }

      .column-list { display: grid; gap: 0.85rem; margin: 0; padding: 0; list-style: none; flex: 1; }

      .task-card, .error-card, .empty-state, .skeleton-card {
        border-radius: 12px; padding: 0.9rem; background: var(--panel); border: 1px solid rgba(15,23,42,0.03);
        box-shadow: 0 8px 20px rgba(12,17,31,0.04);
      }

      .task-card { display: flex; flex-direction: column; gap: 0.5rem; transition: transform 140ms ease, box-shadow 140ms ease; }
      .task-card:hover { transform: translateY(-4px); box-shadow: 0 14px 30px rgba(12,17,31,0.07); }

      .task-card strong { display:block; font-size: 0.98rem; margin-bottom: 0.15rem; }
      .task-card p { margin:0; color:var(--muted); line-height:1.4; font-size:0.92rem; }

      .task-id { display:none; }

      .task-meta { display:flex; justify-content:space-between; align-items:center; gap:0.5rem; color:var(--muted); font-size:0.85rem; }
      .task-meta-details { display:flex; align-items:center; gap:0.45rem; min-width:0; }
      .task-assignee { color: var(--muted); font-size: 0.82rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 140px; }
      .task-meta button { border: none; background: transparent; color: var(--primary); padding: 0.25rem 0.5rem; border-radius: 8px; cursor: pointer; font-weight:600; }

      .priority-pill { display:inline-flex; align-items:center; justify-content:center; padding:0.25rem 0.6rem; border-radius:999px; font-size:0.78rem; font-weight:700; color:var(--pill-text); }
      .priority-high { background: var(--pill-high); }
      .priority-medium { background: var(--pill-medium); }
      .priority-low { background: var(--pill-low); }
      .overdue-pill {
        display: inline-flex;
        align-self: flex-start;
        align-items: center;
        justify-content: center;
        padding: 0.2rem 0.55rem;
        border-radius: 999px;
        font-size: 0.75rem;
        font-weight: 700;
        color: #7f1d1d;
        background: #fee2e2;
        border: 1px solid #fecaca;
      }

      .empty-state { min-height: 120px; display:grid; place-items:center; text-align:center; color:var(--muted); background: linear-gradient(180deg,#fbfbfd,#f8fbff); border-style:dashed; }

      .skeleton-card { position:relative; overflow:hidden; min-height:112px; }
      .skeleton-card::before { content: ""; position:absolute; inset:0; background: linear-gradient(90deg, rgba(255,255,255,0), rgba(255,255,255,0.6), rgba(255,255,255,0)); transform: translateX(-120%); animation: shimmer 1.3s infinite; }
      .skeleton-lines { display:grid; gap:0.65rem; }
      .skeleton-line { height:12px; background:#eaf0f7; border-radius:999px; }
      .skeleton-line.short{ width:45%; } .skeleton-line.medium{ width:70%; } .skeleton-line.long{ width:95%; }
      @keyframes shimmer { to { transform: translateX(120%); } }

      .error-card { border-color: var(--error-border); background: var(--error); color: #991b1b; }
      .error-card strong { display:block; margin-bottom:0.35rem; color:#7f1d1d; }

      .task-card.dragging { opacity: 0.6; transform: none; box-shadow: none; }
      .column.drop-target { border-color: var(--primary); background: rgba(79,70,229,0.03); }

      /* Modal styles */
      .modal-overlay { display:none; position:fixed; inset:0; background: rgba(2,6,23,0.45); z-index:999; }
      .modal-overlay.open { display:grid; place-items:center; }

      .modal { background: var(--panel); border-radius: 12px; box-shadow: var(--shadow-2); max-width: 600px; width: 94%; max-height: 90vh; overflow-y:auto; position:relative; }
      .modal-header { display:flex; justify-content:space-between; align-items:center; padding:1rem 1.25rem; border-bottom:1px solid rgba(15,23,42,0.03); position:sticky; top:0; background:var(--panel); }
      .modal-header h2 { margin:0; font-size:1.15rem; }
      .modal-close-btn { background:transparent; border:none; font-size:1.4rem; cursor:pointer; color:var(--muted); padding:0; width:2rem; height:2rem; display:grid; place-items:center; }
      .modal-close-btn:hover { color:var(--text); }
      .modal-body { padding:1rem 1.25rem; }

      .form-group { margin-bottom:1rem; }
      .form-group label { display:block; margin-bottom:0.4rem; font-weight:600; font-size:0.95rem; }
      .form-group input, .form-group select, .form-group textarea { width:100%; padding:0.6rem 0.75rem; border:1px solid rgba(15,23,42,0.06); border-radius:8px; font-family:inherit; font-size:0.95rem; box-sizing:border-box; }
      .form-group textarea { min-height:90px; }
      .form-group input:focus, .form-group select:focus, .form-group textarea:focus { outline:none; border-color:var(--primary); box-shadow: 0 0 0 6px rgba(79,70,229,0.06); }

      .form-error { color:#dc2626; font-size:0.85rem; margin-top:0.35rem; }
      .modal-errors { background: var(--error); border:1px solid var(--error-border); border-radius:8px; padding:0.75rem 1rem; margin-bottom:1rem; color:#991b1b; font-size:0.9rem; }

      .comments-section {
        margin-top: 1.2rem;
        padding-top: 1rem;
        border-top: 1px solid rgba(15,23,42,0.06);
      }

      .comments-section h3 {
        margin: 0 0 0.75rem;
        font-size: 1rem;
      }

      .comments-status {
        font-size: 0.9rem;
        color: var(--muted);
        margin-bottom: 0.6rem;
      }

      .comments-error {
        color: #b91c1c;
        background: var(--error);
        border: 1px solid var(--error-border);
        border-radius: 8px;
        padding: 0.6rem 0.75rem;
        margin-bottom: 0.7rem;
        font-size: 0.88rem;
      }

      .comment-list {
        list-style: none;
        margin: 0 0 0.9rem;
        padding: 0;
        display: grid;
        gap: 0.6rem;
      }

      .comment-item {
        border: 1px solid rgba(15,23,42,0.06);
        border-radius: 10px;
        background: #fafcff;
        padding: 0.65rem 0.75rem;
      }

      .comment-item p {
        margin: 0 0 0.5rem;
        line-height: 1.45;
        font-size: 0.92rem;
        color: var(--text);
        white-space: pre-wrap;
      }

      .comment-meta {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 0.5rem;
      }

      .comment-date {
        font-size: 0.8rem;
        color: var(--muted);
      }

      .comment-delete-btn {
        border: 1px solid rgba(220,38,38,0.2);
        border-radius: 8px;
        background: #fff;
        color: #b91c1c;
        font-size: 0.82rem;
        font-weight: 700;
        padding: 0.25rem 0.55rem;
        cursor: pointer;
      }

      .comment-delete-btn:disabled,
      .add-comment-btn:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }

      .comment-create {
        display: grid;
        gap: 0.45rem;
      }

      .comment-create textarea {
        min-height: 72px;
      }

      .comment-create-actions {
        display: flex;
        justify-content: flex-end;
      }

      .add-comment-btn {
        border-radius: 8px;
        border: none;
        background: var(--primary);
        color: #fff;
        padding: 0.45rem 0.85rem;
        font-weight: 700;
        cursor: pointer;
      }

      .modal-footer { display:flex; gap:0.75rem; justify-content:flex-end; padding:1rem 1.25rem; border-top:1px solid rgba(15,23,42,0.03); background: linear-gradient(180deg,#fbfbfd,#fff); position:sticky; bottom:0; }
      .modal-btn { border-radius:10px; padding:0.5rem 1.1rem; font-size:0.95rem; font-weight:700; cursor:pointer; border:1px solid rgba(15,23,42,0.05); }
      .modal-btn-cancel { background:#f3f4f6; color:var(--text); }
      .modal-btn-cancel:hover { background:#e9eef2; }
      .modal-btn-submit { background: linear-gradient(90deg,var(--primary),var(--primary-600)); color:#fff; border:none; }
      .modal-btn-submit:disabled { opacity:0.6; cursor:not-allowed; }
    </style>
  </head>
  <body>
    <header class="app-header">
      <div>
        <h1>Task Tracker Kanban</h1>
        <p>Drag tasks between columns to update their status.</p>
      </div>
      <div class="header-controls">
        <label class="overdue-filter" for="overdueOnlyToggle">
          <input
            type="checkbox"
            id="overdueOnlyToggle"
            onchange="handleOverdueFilterChange(event)"
          />
          <span>Show overdue tasks only</span>
        </label>
        <button type="button" class="new-task-btn" onclick="openModal()">+ New Task</button>
      </div>
    </header>
    <main>
      <section id="board" class="board" aria-live="polite"></section>
    </main>
    <div id="modalOverlay" class="modal-overlay" onclick="handleOverlayClick(event)">
      <div class="modal" onclick="event.stopPropagation()">
        <div class="modal-header">
          <h2 id="modalTitle">New Task</h2>
          <button type="button" class="modal-close-btn" onclick="closeModal()">&times;</button>
        </div>
        <form id="taskForm" onsubmit="submitTaskForm(event)">
          <div class="modal-body">
            <div id="modalErrors" class="modal-errors" style="display: none;"></div>
            <input type="hidden" id="taskId" name="taskId" />
            <div class="form-group">
              <label for="taskTitle">Title *</label>
              <input type="text" id="taskTitle" name="title" required />
              <div id="titleError" class="form-error"></div>
            </div>
            <div class="form-group">
              <label for="taskDescription">Description</label>
              <textarea id="taskDescription" name="description"></textarea>
              <div id="descriptionError" class="form-error"></div>
            </div>
            <div class="form-group">
              <label for="taskStatus">Status</label>
              <select id="taskStatus" name="status">
                <option value="ToDo">ToDo</option>
                <option value="InProgress">In Progress</option>
                <option value="Done">Done</option>
              </select>
              <div id="statusError" class="form-error"></div>
            </div>
            <div class="form-group">
              <label for="taskPriority">Priority</label>
              <select id="taskPriority" name="priority">
                <option value="Low">Low</option>
                <option value="Medium">Medium</option>
                <option value="High">High</option>
              </select>
              <div id="priorityError" class="form-error"></div>
            </div>
            <div class="form-group">
              <label for="taskAssignee">Assignee</label>
              <input type="text" id="taskAssignee" name="assignee" placeholder="Optional" />
              <div id="assigneeError" class="form-error"></div>
            </div>
            <div class="form-group">
              <label for="taskDueDate">Due date</label>
              <input type="date" id="taskDueDate" name="dueDate" />
              <div id="dueDateError" class="form-error"></div>
            </div>
            <section id="commentsSection" class="comments-section" style="display: none;" aria-live="polite">
              <h3>Comments</h3>
              <div id="commentsError" class="comments-error" style="display: none;"></div>
              <div id="commentsStatus" class="comments-status" style="display: none;"></div>
              <ul id="commentsList" class="comment-list"></ul>
              <div class="comment-create">
                <label for="newCommentText">Add a comment</label>
                <textarea id="newCommentText" placeholder="Write a comment"></textarea>
                <div id="newCommentValidation" class="form-error"></div>
                <div class="comment-create-actions">
                  <button type="button" id="addCommentBtn" class="add-comment-btn" onclick="handleAddComment()">Add Comment</button>
                </div>
              </div>
            </section>
          </div>
          <div class="modal-footer">
            <button type="button" class="modal-btn modal-btn-cancel" onclick="closeModal()">Cancel</button>
            <button type="submit" class="modal-btn modal-btn-submit">Save Task</button>
          </div>
        </form>
      </div>
    </div>
    <script>
      const API_BASE_URL = "http://127.0.0.1:8000";
      const STATUSES = ["ToDo", "InProgress", "Done"];
      const STATUS_LABELS = {
        ToDo: "ToDo",
        InProgress: "In Progress",
        Done: "Done"
      };
      const PRIORITY_ORDER = { High: 0, Medium: 1, Low: 2 };
      let tasks = [];
      let boardState = "loading";
      let boardErrorMessage = "";
      let showOverdueOnly = false;

      async function fetchTasks() {
        boardErrorMessage = "";
        boardState = "loading";
        render();

        try {
          const query = showOverdueOnly ? "?overdue=true" : "";
          const response = await fetch(`${API_BASE_URL}/tasks${query}`);
          if (!response.ok) {
            throw new Error(`Request failed with status ${response.status}`);
          }

          const data = await response.json();
          tasks = Array.isArray(data) ? data : [];
          if (tasks.length > 0) {
            boardState = "ready";
          } else {
            boardState = "empty";
          }
        } catch (error) {
          console.error(error);
          boardState = "error";
          boardErrorMessage = "There was a problem fetching the task list. Please check the server and try again.";
          tasks = [];
        }

        render();
      }

      function render() {
        const board = document.getElementById("board");

        if (boardState === "loading") {
          board.innerHTML = renderLoadingBoard();
          return;
        }

        board.innerHTML = `${renderErrorNotice()}${renderBoard(tasks)}`;

        if (boardState !== "error") {
          attachDragAndDrop();
        }
      }

      function handleOverdueFilterChange(event) {
        showOverdueOnly = event.target.checked;
        fetchTasks();
      }

      function renderErrorNotice() {
        if (boardState !== "error") {
          if (!boardErrorMessage) {
            return "";
          }

          return `
            <div class="error-card" role="alert">
              <strong>Unable to update task</strong>
              <p>${escapeHtml(boardErrorMessage)}</p>
            </div>
          `;
        }

        return `
          <div class="error-card" role="alert">
            <strong>Unable to load tasks</strong>
            <p>${escapeHtml(boardErrorMessage)}</p>
            <button type="button" onclick="fetchTasks()">Retry</button>
          </div>
        `;
      }

      function renderLoadingBoard() {
        return STATUSES.map(
          () => `
            <section class="column">
              <div class="column-header">
                <h2>Loading</h2>
                <span class="column-count">...</span>
              </div>
              <div class="column-list">
                <div class="skeleton-card">
                  <div class="skeleton-lines">
                    <div class="skeleton-line long"></div>
                    <div class="skeleton-line medium"></div>
                  </div>
                </div>
                <div class="skeleton-card">
                  <div class="skeleton-lines">
                    <div class="skeleton-line long"></div>
                    <div class="skeleton-line short"></div>
                  </div>
                </div>
              </div>
            </section>
          `
        ).join("");
      }

      function renderBoard(taskItems = tasks) {
        const grouped = STATUSES.reduce((result, status) => {
          result[status] = [];
          return result;
        }, {});

        taskItems.forEach((task) => {
          const status = STATUSES.includes(task.status) ? task.status : "ToDo";
          grouped[status].push(task);
        });

        return STATUSES.map((status) => {
          const sortedTasks = grouped[status].slice().sort((a, b) => {
            const priorityDiff = (PRIORITY_ORDER[a.priority] ?? 3) - (PRIORITY_ORDER[b.priority] ?? 3);
            if (priorityDiff !== 0) {
              return priorityDiff;
            }

            return Number(a.id) - Number(b.id);
          });

          const items = sortedTasks.length
            ? sortedTasks.map(renderCard).join("")
            : `<div class="empty-state"><span>Drop tasks here</span></div>`;

          return `
            <section class="column" data-status="${status}">
              <div class="column-header">
                <h2>${STATUS_LABELS[status]}</h2>
                <span class="column-count">${sortedTasks.length} ${sortedTasks.length === 1 ? "task" : "tasks"}</span>
              </div>
              <div class="column-list">${items}</div>
            </section>
          `;
        }).join("");
      }

      function renderCard(task) {
        const priority = task.priority || "Low";
        const priorityClass = `priority-${priority.toLowerCase()}`;
        const showOverdue = Boolean(task.due_date) && task.overdue === true;

        return `
          <div class="task-card" draggable="true" data-task-id="${escapeHtml(task.id)}">
            <div>
              <strong>${escapeHtml(task.title || `Task ${task.id}`)}</strong>
              <span class="task-id">#${escapeHtml(task.id)}</span>
            </div>
            <p>${escapeHtml(task.description || "No description")}</p>
            ${task.due_date ? `<p class="task-due-date">Due date: ${escapeHtml(task.due_date)}</p>` : ""}
            ${showOverdue ? `<span class="overdue-pill">Overdue</span>` : ""}
            <div class="task-meta">
              <div class="task-meta-details">
                <span class="priority-pill ${priorityClass}">${escapeHtml(priority)}</span>
                ${task.assignee ? `<span class="task-assignee">${escapeHtml(task.assignee)}</span>` : ""}
              </div>
              <button type="button" onclick="openModal(${JSON.stringify(task).replace(/"/g, '&quot;')})">Edit</button>
            </div>
          </div>
        `;
      }

      function attachDragAndDrop() {
        const board = document.getElementById("board");
        const columns = board.querySelectorAll(".column");
        const cards = board.querySelectorAll(".task-card");

        cards.forEach((card) => {
          card.addEventListener("dragstart", onCardDragStart);
          card.addEventListener("dragend", onCardDragEnd);
        });

        columns.forEach((column) => {
          column.addEventListener("dragover", onColumnDragOver);
          column.addEventListener("dragenter", onColumnDragEnter);
          column.addEventListener("dragleave", onColumnDragLeave);
          column.addEventListener("drop", onColumnDrop);
        });
      }

      function onCardDragStart(event) {
        const card = event.currentTarget;
        const taskId = card.dataset.taskId;
        event.dataTransfer.effectAllowed = "move";
        event.dataTransfer.setData("text/plain", taskId);
        card.classList.add("dragging");
      }

      function onCardDragEnd() {
        document.querySelectorAll(".task-card.dragging").forEach((card) => {
          card.classList.remove("dragging");
        });
        document.querySelectorAll(".column.drop-target").forEach((column) => {
          column.classList.remove("drop-target");
        });
      }

      function onColumnDragOver(event) {
        event.preventDefault();
      }

      function onColumnDragEnter(event) {
        const column = event.currentTarget;
        const taskId = event.dataTransfer.getData("text/plain");
        const targetStatus = column.dataset.status;
        const task = tasks.find((item) => String(item.id) === String(taskId));

        if (task && task.status !== targetStatus) {
          column.classList.add("drop-target");
        }
      }

      function onColumnDragLeave(event) {
        const column = event.currentTarget;
        column.classList.remove("drop-target");
      }

      function onColumnDrop(event) {
        event.preventDefault();
        const column = event.currentTarget;
        const taskId = event.dataTransfer.getData("text/plain");
        const targetStatus = column.dataset.status;
        const task = tasks.find((item) => String(item.id) === String(taskId));

        column.classList.remove("drop-target");

        if (!task || task.status === targetStatus) {
          return;
        }

        const previousStatus = task.status;
        task.status = targetStatus;
        boardErrorMessage = "";
        render();
        patchTaskStatus(taskId, targetStatus, previousStatus);
      }

      async function patchTaskStatus(id, status, previousStatus) {
        try {
          const response = await fetch(`${API_BASE_URL}/tasks/${id}`, {
            method: "PATCH",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ status })
          });

          if (response.ok) {
            fetchTasks();
            return;
          }

          const data = await response.json().catch(() => null);
          const message = data?.message || data?.error || `Request failed with status ${response.status}`;
          revertTaskStatus(id, previousStatus);
          boardErrorMessage = message;
          render();
        } catch (error) {
          console.error(error);
          revertTaskStatus(id, previousStatus);
          boardErrorMessage = "Unable to update task status. Please check your network connection and try again.";
          render();
        }
      }

      function revertTaskStatus(id, previousStatus) {
        const task = tasks.find((item) => String(item.id) === String(id));
        if (task) {
          task.status = previousStatus;
        }
      }

      function escapeHtml(value) {
        return String(value)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      /* Modal functions */
      let currentModalMode = "create";
      let commentsTaskId = null;
      let commentsLoadToken = 0;

      function getCommentsElements() {
        return {
          section: document.getElementById("commentsSection"),
          error: document.getElementById("commentsError"),
          status: document.getElementById("commentsStatus"),
          list: document.getElementById("commentsList"),
          input: document.getElementById("newCommentText"),
          validation: document.getElementById("newCommentValidation"),
          addButton: document.getElementById("addCommentBtn")
        };
      }

      function resetCommentsUi() {
        const elements = getCommentsElements();
        elements.error.style.display = "none";
        elements.error.textContent = "";
        elements.status.style.display = "none";
        elements.status.textContent = "";
        elements.list.replaceChildren();
        elements.input.value = "";
        elements.validation.textContent = "";
        elements.addButton.disabled = false;
      }

      function setCommentsStatus(message) {
        const { status } = getCommentsElements();
        if (!message) {
          status.style.display = "none";
          status.textContent = "";
          return;
        }

        status.textContent = message;
        status.style.display = "block";
      }

      function showCommentsError(message) {
        const { error } = getCommentsElements();
        error.textContent = message;
        error.style.display = "block";
      }

      function clearCommentsError() {
        const { error } = getCommentsElements();
        error.style.display = "none";
        error.textContent = "";
      }

      function formatCommentDate(value) {
        if (!value) {
          return "Unknown time";
        }

        const parsed = new Date(value);
        if (Number.isNaN(parsed.getTime())) {
          return String(value);
        }

        return parsed.toLocaleString();
      }

      function renderCommentsList(commentItems) {
        const { list } = getCommentsElements();
        list.replaceChildren();

        const orderedComments = commentItems.slice().sort((a, b) => {
          const left = new Date(a.created_at).getTime();
          const right = new Date(b.created_at).getTime();
          if (Number.isNaN(left) || Number.isNaN(right)) {
            return Number(a.id) - Number(b.id);
          }

          return left - right;
        });

        orderedComments.forEach((comment) => {
          const item = document.createElement("li");
          item.className = "comment-item";

          const text = document.createElement("p");
          text.textContent = comment.text || "";

          const meta = document.createElement("div");
          meta.className = "comment-meta";

          const date = document.createElement("span");
          date.className = "comment-date";
          date.textContent = formatCommentDate(comment.created_at);

          const deleteButton = document.createElement("button");
          deleteButton.type = "button";
          deleteButton.className = "comment-delete-btn";
          deleteButton.textContent = "Delete";
          deleteButton.addEventListener("click", () => {
            deleteComment(comment.id, deleteButton);
          });

          meta.append(date, deleteButton);
          item.append(text, meta);
          list.append(item);
        });
      }

      async function loadComments(taskId) {
        const requestToken = ++commentsLoadToken;
        clearCommentsError();
        setCommentsStatus("Loading comments...");
        getCommentsElements().list.replaceChildren();

        try {
          const response = await fetch(`${API_BASE_URL}/tasks/${taskId}/comments`);
          if (!response.ok) {
            throw new Error(`Request failed with status ${response.status}`);
          }

          const data = await response.json();
          if (requestToken !== commentsLoadToken) {
            return;
          }

          const comments = Array.isArray(data) ? data : [];
          if (!comments.length) {
            setCommentsStatus("No comments yet");
            return;
          }

          setCommentsStatus("");
          renderCommentsList(comments);
        } catch (error) {
          console.error(error);
          if (requestToken !== commentsLoadToken) {
            return;
          }

          setCommentsStatus("");
          showCommentsError("Unable to load comments. You can still edit and save the task.");
        }
      }

      async function handleAddComment() {
        if (!commentsTaskId) {
          return;
        }

        clearCommentsError();
        const elements = getCommentsElements();
        const trimmedText = elements.input.value.trim();
        elements.validation.textContent = "";

        if (!trimmedText) {
          elements.validation.textContent = "Comment cannot be empty.";
          elements.input.focus();
          return;
        }

        elements.addButton.disabled = true;

        try {
          const response = await fetch(`${API_BASE_URL}/tasks/${commentsTaskId}/comments`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ text: trimmedText })
          });

          if (response.ok) {
            elements.input.value = "";
            await loadComments(commentsTaskId);
            return;
          }

          if (response.status === 422) {
            const data = await response.json().catch(() => ({}));
            const message = Array.isArray(data.detail)
              ? (data.detail[0]?.msg || "Comment text is invalid.")
              : (data.detail || data.message || "Comment text is invalid.");
            elements.validation.textContent = message;
            return;
          }

          const data = await response.json().catch(() => ({}));
          const message = data?.message || data?.error || `Request failed with status ${response.status}`;
          showCommentsError(`Unable to add comment. ${message}`);
        } catch (error) {
          console.error(error);
          showCommentsError("Unable to add comment due to a network error. Please try again.");
        } finally {
          elements.addButton.disabled = false;
        }
      }

      async function deleteComment(commentId, button) {
        if (!commentsTaskId) {
          return;
        }

        clearCommentsError();
        if (button) {
          button.disabled = true;
        }

        try {
          const response = await fetch(`${API_BASE_URL}/tasks/${commentsTaskId}/comments/${commentId}`, {
            method: "DELETE"
          });

          if (response.status === 204) {
            await loadComments(commentsTaskId);
            return;
          }

          const data = await response.json().catch(() => ({}));
          const message = data?.message || data?.error || `Request failed with status ${response.status}`;
          showCommentsError(`Unable to delete comment. ${message}`);
        } catch (error) {
          console.error(error);
          showCommentsError("Unable to delete comment due to a network error. Please try again.");
        } finally {
          if (button) {
            button.disabled = false;
          }
        }
      }

      function openModal(task) {
        const overlay = document.getElementById("modalOverlay");
        const form = document.getElementById("taskForm");
        const modalTitle = document.getElementById("modalTitle");
        const commentsElements = getCommentsElements();

        // Clear previous state
        clearModalErrors();
        form.reset();
        resetCommentsUi();
        commentsTaskId = null;
        commentsElements.section.style.display = "none";

        if (task) {
          // Edit mode
          currentModalMode = "edit";
          modalTitle.textContent = "Edit Task";
          document.getElementById("taskId").value = task.id || "";
          document.getElementById("taskTitle").value = task.title || "";
          document.getElementById("taskDescription").value = task.description || "";
          document.getElementById("taskStatus").value = task.status || "ToDo";
          document.getElementById("taskPriority").value = task.priority || "Low";
          document.getElementById("taskAssignee").value = task.assignee || "";
          document.getElementById("taskDueDate").value = task.due_date || "";
          commentsTaskId = task.id;
          commentsElements.section.style.display = "block";
          loadComments(task.id);
        } else {
          // Create mode
          currentModalMode = "create";
          modalTitle.textContent = "New Task";
          document.getElementById("taskId").value = "";
          document.getElementById("taskStatus").value = "ToDo";
          document.getElementById("taskPriority").value = "Low";
          document.getElementById("taskDueDate").value = "";
        }

        overlay.classList.add("open");
        document.getElementById("taskTitle").focus();
      }

      function closeModal() {
        const overlay = document.getElementById("modalOverlay");
        overlay.classList.remove("open");
        clearModalErrors();
        document.getElementById("taskForm").reset();
        commentsTaskId = null;
        commentsLoadToken += 1;
        resetCommentsUi();
        getCommentsElements().section.style.display = "none";
      }

      function handleOverlayClick(event) {
        if (event.target.id === "modalOverlay") {
          closeModal();
        }
      }

      function clearModalErrors() {
        document.getElementById("modalErrors").style.display = "none";
        document.getElementById("modalErrors").textContent = "";
        document.querySelectorAll(".form-error").forEach((el) => {
          el.textContent = "";
        });
      }

      async function submitTaskForm(event) {
        event.preventDefault();
        clearModalErrors();

        const title = document.getElementById("taskTitle").value.trim();
        const description = document.getElementById("taskDescription").value;
        const status = document.getElementById("taskStatus").value;
        const priority = document.getElementById("taskPriority").value;
        const assignee = document.getElementById("taskAssignee").value.trim();
        const dueDate = document.getElementById("taskDueDate").value;
        const taskId = document.getElementById("taskId").value;

        // Client-side validation
        if (!title) {
          document.getElementById("titleError").textContent = "Title is required";
          document.getElementById("taskTitle").focus();
          return;
        }

        const url = currentModalMode === "edit"
          ? `${API_BASE_URL}/tasks/${taskId}`
          : `${API_BASE_URL}/tasks`;

        const method = currentModalMode === "edit" ? "PATCH" : "POST";
        const payload = {
          title,
          description: description || "",
          status,
          priority,
          assignee: assignee || null
        };

        if (currentModalMode === "edit") {
          payload.due_date = dueDate || null;
        } else if (dueDate) {
          payload.due_date = dueDate;
        }

        try {
          const response = await fetch(url, {
            method,
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
          });

          if (response.ok) {
            // Success: close modal and refresh board
            closeModal();
            fetchTasks();
            return;
          }

          if (response.status === 422) {
            // Validation error from server
            const data = await response.json().catch(() => ({}));

            if (data.detail) {
              // If detail is an array of validation errors
              if (Array.isArray(data.detail)) {
                data.detail.forEach((error) => {
                  const fieldName = error.loc?.[1];
                  const message = error.msg || "Invalid value";
                  if (fieldName && document.getElementById(`${fieldName}Error`)) {
                    document.getElementById(`${fieldName}Error`).textContent = message;
                  } else {
                    showModalError(message);
                  }
                });
              } else {
                showModalError(data.detail);
              }
            } else if (data.message) {
              showModalError(data.message);
            } else if (data.error) {
              showModalError(data.error);
            } else {
              showModalError("Validation failed. Please check your input.");
            }
            return;
          }

          // Other error responses
          const data = await response.json().catch(() => ({}));
          const message = data?.message || data?.error || `Request failed with status ${response.status}`;
          showModalError(message);
        } catch (error) {
          console.error(error);
          showModalError("Network error. Please check your connection and try again.");
        }
      }

      function showModalError(message) {
        const errorContainer = document.getElementById("modalErrors");
        errorContainer.textContent = message;
        errorContainer.style.display = "block";
      }

      // Handle Escape key to close modal
      document.addEventListener("keydown", (event) => {
        if (event.key === "Escape") {
          const overlay = document.getElementById("modalOverlay");
          if (overlay.classList.contains("open")) {
            closeModal();
          }
        }
      });

      document.addEventListener("DOMContentLoaded", fetchTasks);
    </script>
  </body>
</html>
