<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Task Tracker Kanban</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f6f7f9;
        --panel: #ffffff;
        --panel-strong: #e5e7eb;
        --text: #111827;
        --muted: #6b7280;
        --border: #d8dde6;
        --shadow: rgba(15, 23, 42, 0.06);
        --pill-high: #fdecef;
        --pill-medium: #fff4db;
        --pill-low: #e9f7ef;
        --pill-text: #111827;
        --error: #fef2f2;
        --error-border: #fca5a5;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: var(--bg);
        color: var(--text);
      }

      body {
        padding: 1.5rem 1rem 2rem;
      }

      .app-header {
        max-width: 920px;
        margin: 0 auto 1.5rem;
        padding: 1.2rem 1.25rem;
        border-radius: 24px;
        background: var(--panel);
        box-shadow: 0 18px 45px -30px var(--shadow);
      }

      .app-header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
      }

      .app-header > div:first-child {
        flex: 1;
      }

      .app-header h1 {
        margin: 0 0 0.35rem;
        font-size: clamp(1.6rem, 2.2vw, 2rem);
        letter-spacing: -0.03em;
      }

      .app-header p {
        margin: 0;
        color: var(--muted);
        line-height: 1.6;
      }

      .new-task-btn {
        border: 1px solid #d1d5db;
        border-radius: 10px;
        background: #3b82f6;
        color: #ffffff;
        padding: 0.5rem 1rem;
        font-size: 0.9rem;
        font-weight: 500;
        cursor: pointer;
        white-space: nowrap;
        margin-top: 0.2rem;
      }

      .new-task-btn:hover {
        background: #2563eb;
      }

      main {
        display: flex;
        justify-content: center;
      }

      .board {
        display: grid;
        gap: 1rem;
        max-width: 920px;
        width: 100%;
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      @media (max-width: 860px) {
        .board {
          grid-template-columns: 1fr;
        }
      }

      .column {
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
        padding: 1rem;
        border: 1px solid var(--border);
        border-radius: 20px;
        background: #fbfcfe;
        box-shadow: 0 14px 32px -22px var(--shadow);
        min-height: 480px;
      }

      .column-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.75rem;
        padding-bottom: 0.35rem;
        border-bottom: 1px solid var(--panel-strong);
      }

      .column-header h2 {
        margin: 0;
        font-size: 1rem;
        font-weight: 700;
      }

      .column-count {
        color: var(--muted);
        font-size: 0.85rem;
      }

      .column-list {
        display: grid;
        gap: 0.85rem;
        margin: 0;
        padding: 0;
        list-style: none;
        flex: 1;
      }

      .task-card,
      .error-card,
      .empty-state,
      .skeleton-card {
        border-radius: 16px;
        padding: 0.95rem;
        background: var(--panel);
        border: 1px solid #e8edf4;
        box-shadow: 0 8px 20px -16px var(--shadow);
      }

      .task-card {
        display: grid;
        gap: 0.65rem;
      }

      .task-card strong {
        display: block;
        font-size: 0.98rem;
        margin-bottom: 0.3rem;
      }

      .task-card p {
        margin: 0;
        color: var(--muted);
        line-height: 1.5;
        font-size: 0.92rem;
      }

      .task-id {
        display: none;
      }

      .task-meta {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 0.75rem;
        flex-wrap: wrap;
        color: var(--muted);
        font-size: 0.86rem;
      }

      .task-meta button {
        border: 1px solid #d1d5db;
        border-radius: 10px;
        background: #f8fafc;
        color: var(--text);
        padding: 0.35rem 0.75rem;
        font-size: 0.85rem;
        cursor: pointer;
      }

      .priority-pill {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0.3rem 0.65rem;
        border-radius: 999px;
        font-size: 0.8rem;
        font-weight: 600;
        color: var(--pill-text);
      }

      .priority-high {
        background: var(--pill-high);
      }

      .priority-medium {
        background: var(--pill-medium);
      }

      .priority-low {
        background: var(--pill-low);
      }

      .empty-state {
        min-height: 145px;
        display: grid;
        place-items: center;
        text-align: center;
        color: var(--muted);
        background: #f8f9fb;
        border-style: dashed;
      }

      .empty-state span {
        display: block;
        font-size: 0.92rem;
      }

      .skeleton-card {
        position: relative;
        overflow: hidden;
        min-height: 112px;
      }

      .skeleton-card::before {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(90deg, rgba(255,255,255,0), rgba(255,255,255,0.65), rgba(255,255,255,0));
        transform: translateX(-120%);
        animation: shimmer 1.3s infinite;
      }

      .skeleton-lines {
        display: grid;
        gap: 0.65rem;
      }

      .skeleton-line {
        height: 12px;
        background: #eaf0f7;
        border-radius: 999px;
      }

      .skeleton-line.short {
        width: 45%;
      }

      .skeleton-line.medium {
        width: 70%;
      }

      .skeleton-line.long {
        width: 95%;
      }

      @keyframes shimmer {
        to {
          transform: translateX(120%);
        }
      }

      .error-card {
        border-color: var(--error-border);
        background: var(--error);
        color: #991b1b;
      }

      .error-card strong {
        display: block;
        margin-bottom: 0.35rem;
        color: #7f1d1d;
      }

      .task-card.dragging {
        opacity: 0.55;
      }

      .column.drop-target {
        border-color: #3b82f6;
        background: #eff6ff;
      }

      /* Modal styles */
      .modal-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.5);
        z-index: 999;
      }

      .modal-overlay.open {
        display: grid;
        place-items: center;
      }

      .modal {
        background: var(--panel);
        border-radius: 20px;
        box-shadow: 0 20px 60px -20px rgba(0, 0, 0, 0.3);
        max-width: 500px;
        width: 90%;
        max-height: 90vh;
        overflow-y: auto;
        position: relative;
      }

      .modal-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 1.5rem;
        border-bottom: 1px solid var(--border);
        position: sticky;
        top: 0;
        background: var(--panel);
      }

      .modal-header h2 {
        margin: 0;
        font-size: 1.3rem;
      }

      .modal-close-btn {
        background: transparent;
        border: none;
        font-size: 1.5rem;
        cursor: pointer;
        color: var(--muted);
        padding: 0;
        width: 2rem;
        height: 2rem;
        display: grid;
        place-items: center;
      }

      .modal-close-btn:hover {
        color: var(--text);
      }

      .modal-body {
        padding: 1.5rem;
      }

      .form-group {
        margin-bottom: 1.2rem;
      }

      .form-group:last-child {
        margin-bottom: 0;
      }

      .form-group label {
        display: block;
        margin-bottom: 0.4rem;
        font-weight: 500;
        font-size: 0.9rem;
      }

      .form-group input,
      .form-group select,
      .form-group textarea {
        width: 100%;
        padding: 0.6rem 0.75rem;
        border: 1px solid var(--border);
        border-radius: 8px;
        font-family: inherit;
        font-size: 0.95rem;
        box-sizing: border-box;
      }

      .form-group textarea {
        resize: vertical;
        min-height: 80px;
      }

      .form-group input:focus,
      .form-group select:focus,
      .form-group textarea:focus {
        outline: none;
        border-color: #3b82f6;
        box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
      }

      .form-error {
        color: #dc2626;
        font-size: 0.85rem;
        margin-top: 0.3rem;
      }

      .modal-errors {
        background: var(--error);
        border: 1px solid var(--error-border);
        border-radius: 8px;
        padding: 0.75rem 1rem;
        margin-bottom: 1.2rem;
        color: #991b1b;
        font-size: 0.9rem;
      }

      .modal-footer {
        display: flex;
        gap: 0.75rem;
        justify-content: flex-end;
        padding: 1.5rem;
        border-top: 1px solid var(--border);
        background: #f9fafb;
        position: sticky;
        bottom: 0;
      }

      .modal-btn {
        border: 1px solid #d1d5db;
        border-radius: 10px;
        padding: 0.5rem 1.2rem;
        font-size: 0.9rem;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.2s;
      }

      .modal-btn-cancel {
        background: #f3f4f6;
        color: var(--text);
      }

      .modal-btn-cancel:hover {
        background: #e5e7eb;
      }

      .modal-btn-submit {
        background: #3b82f6;
        color: #ffffff;
        border-color: #3b82f6;
      }

      .modal-btn-submit:hover {
        background: #2563eb;
        border-color: #2563eb;
      }

      .modal-btn-submit:disabled {
        background: #9ca3af;
        border-color: #9ca3af;
        cursor: not-allowed;
        opacity: 0.6;
      }
    </style>
  </head>
  <body>
    <header class="app-header">
      <div>
        <h1>Task Tracker Kanban</h1>
        <p>Drag tasks between columns to update their status.</p>
      </div>
      <button type="button" class="new-task-btn" onclick="openModal()">+ New Task</button>
    </header>
    <main>
      <section id="board" class="board" aria-live="polite"></section>
    </main>
    <div id="modalOverlay" class="modal-overlay" onclick="handleOverlayClick(event)">
      <div class="modal" onclick="event.stopPropagation()">
        <div class="modal-header">
          <h2 id="modalTitle">New Task</h2>
          <button type="button" class="modal-close-btn" onclick="closeModal()">&times;</button>
        </div>
        <form id="taskForm" onsubmit="submitTaskForm(event)">
          <div class="modal-body">
            <div id="modalErrors" class="modal-errors" style="display: none;"></div>
            <input type="hidden" id="taskId" name="taskId" />
            <div class="form-group">
              <label for="taskTitle">Title *</label>
              <input type="text" id="taskTitle" name="title" required />
              <div id="titleError" class="form-error"></div>
            </div>
            <div class="form-group">
              <label for="taskDescription">Description</label>
              <textarea id="taskDescription" name="description"></textarea>
              <div id="descriptionError" class="form-error"></div>
            </div>
            <div class="form-group">
              <label for="taskStatus">Status</label>
              <select id="taskStatus" name="status">
                <option value="ToDo">ToDo</option>
                <option value="InProgress">In Progress</option>
                <option value="Done">Done</option>
              </select>
              <div id="statusError" class="form-error"></div>
            </div>
            <div class="form-group">
              <label for="taskPriority">Priority</label>
              <select id="taskPriority" name="priority">
                <option value="Low">Low</option>
                <option value="Medium">Medium</option>
                <option value="High">High</option>
              </select>
              <div id="priorityError" class="form-error"></div>
            </div>
            <div class="form-group">
              <label for="taskAssignee">Assignee</label>
              <input type="text" id="taskAssignee" name="assignee" placeholder="Optional" />
              <div id="assigneeError" class="form-error"></div>
            </div>
          </div>
          <div class="modal-footer">
            <button type="button" class="modal-btn modal-btn-cancel" onclick="closeModal()">Cancel</button>
            <button type="submit" class="modal-btn modal-btn-submit">Save Task</button>
          </div>
        </form>
      </div>
    </div>
    <script>
      const API_BASE = window.location.origin && window.location.origin !== "null"
        ? window.location.origin
        : "http://localhost:8000";
      const STATUSES = ["ToDo", "InProgress", "Done"];
      const STATUS_LABELS = {
        ToDo: "ToDo",
        InProgress: "In Progress",
        Done: "Done"
      };
      const PRIORITY_ORDER = { High: 0, Medium: 1, Low: 2 };
      let tasks = [];
      let boardState = "loading";
      let boardErrorMessage = "";

      async function fetchTasks() {
        boardErrorMessage = "";
        boardState = "loading";
        render();

        try {
          const response = await fetch(`${API_BASE}/tasks`);
          if (!response.ok) {
            throw new Error(`Request failed with status ${response.status}`);
          }

          const data = await response.json();
          tasks = Array.isArray(data) ? data : [];
          boardState = tasks.length > 0 ? "ready" : "empty";
        } catch (error) {
          console.error(error);
          boardState = "error";
          boardErrorMessage = "There was a problem fetching the task list. Please check the server and try again.";
          tasks = [];
        }

        render();
      }

      function render() {
        const board = document.getElementById("board");

        if (boardState === "loading") {
          board.innerHTML = renderLoadingBoard();
          return;
        }

        board.innerHTML = `${renderErrorNotice()}${renderBoard(tasks)}`;

        if (boardState !== "error") {
          attachDragAndDrop();
        }
      }

      function renderErrorNotice() {
        if (boardState !== "error") {
          if (!boardErrorMessage) {
            return "";
          }

          return `
            <div class="error-card" role="alert">
              <strong>Unable to update task</strong>
              <p>${escapeHtml(boardErrorMessage)}</p>
            </div>
          `;
        }

        return `
          <div class="error-card" role="alert">
            <strong>Unable to load tasks</strong>
            <p>${escapeHtml(boardErrorMessage)}</p>
            <button type="button" onclick="fetchTasks()">Retry</button>
          </div>
        `;
      }

      function renderLoadingBoard() {
        return STATUSES.map(
          () => `
            <section class="column">
              <div class="column-header">
                <h2>Loading</h2>
                <span class="column-count">...</span>
              </div>
              <div class="column-list">
                <div class="skeleton-card">
                  <div class="skeleton-lines">
                    <div class="skeleton-line long"></div>
                    <div class="skeleton-line medium"></div>
                  </div>
                </div>
                <div class="skeleton-card">
                  <div class="skeleton-lines">
                    <div class="skeleton-line long"></div>
                    <div class="skeleton-line short"></div>
                  </div>
                </div>
              </div>
            </section>
          `
        ).join("");
      }

      function renderBoard(taskItems = tasks) {
        const grouped = STATUSES.reduce((result, status) => {
          result[status] = [];
          return result;
        }, {});

        taskItems.forEach((task) => {
          const status = STATUSES.includes(task.status) ? task.status : "ToDo";
          grouped[status].push(task);
        });

        return STATUSES.map((status) => {
          const sortedTasks = grouped[status].slice().sort((a, b) => {
            const priorityDiff = (PRIORITY_ORDER[a.priority] ?? 3) - (PRIORITY_ORDER[b.priority] ?? 3);
            if (priorityDiff !== 0) {
              return priorityDiff;
            }

            return Number(a.id) - Number(b.id);
          });

          const items = sortedTasks.length
            ? sortedTasks.map(renderCard).join("")
            : `<div class="empty-state"><span>Drop tasks here</span></div>`;

          return `
            <section class="column" data-status="${status}">
              <div class="column-header">
                <h2>${STATUS_LABELS[status]}</h2>
                <span class="column-count">${sortedTasks.length} ${sortedTasks.length === 1 ? "task" : "tasks"}</span>
              </div>
              <div class="column-list">${items}</div>
            </section>
          `;
        }).join("");
      }

      function renderCard(task) {
        const priority = task.priority || "Low";
        const priorityClass = `priority-${priority.toLowerCase()}`;

        return `
          <div class="task-card" draggable="true" data-task-id="${escapeHtml(task.id)}">
            <div>
              <strong>${escapeHtml(task.title || `Task ${task.id}`)}</strong>
              <span class="task-id">#${escapeHtml(task.id)}</span>
            </div>
            <p>${escapeHtml(task.description || "No description")}</p>
            <div class="task-meta">
              <span class="priority-pill ${priorityClass}">${escapeHtml(priority)}</span>
              <button type="button" onclick="openModal(${JSON.stringify(task).replace(/"/g, '&quot;')})">Edit</button>
            </div>
          </div>
        `;
      }

      function attachDragAndDrop() {
        const board = document.getElementById("board");
        const columns = board.querySelectorAll(".column");
        const cards = board.querySelectorAll(".task-card");

        cards.forEach((card) => {
          card.addEventListener("dragstart", onCardDragStart);
          card.addEventListener("dragend", onCardDragEnd);
        });

        columns.forEach((column) => {
          column.addEventListener("dragover", onColumnDragOver);
          column.addEventListener("dragenter", onColumnDragEnter);
          column.addEventListener("dragleave", onColumnDragLeave);
          column.addEventListener("drop", onColumnDrop);
        });
      }

      function onCardDragStart(event) {
        const card = event.currentTarget;
        const taskId = card.dataset.taskId;
        event.dataTransfer.effectAllowed = "move";
        event.dataTransfer.setData("text/plain", taskId);
        card.classList.add("dragging");
      }

      function onCardDragEnd() {
        document.querySelectorAll(".task-card.dragging").forEach((card) => {
          card.classList.remove("dragging");
        });
        document.querySelectorAll(".column.drop-target").forEach((column) => {
          column.classList.remove("drop-target");
        });
      }

      function onColumnDragOver(event) {
        event.preventDefault();
      }

      function onColumnDragEnter(event) {
        const column = event.currentTarget;
        const taskId = event.dataTransfer.getData("text/plain");
        const targetStatus = column.dataset.status;
        const task = tasks.find((item) => String(item.id) === String(taskId));

        if (task && task.status !== targetStatus) {
          column.classList.add("drop-target");
        }
      }

      function onColumnDragLeave(event) {
        const column = event.currentTarget;
        column.classList.remove("drop-target");
      }

      function onColumnDrop(event) {
        event.preventDefault();
        const column = event.currentTarget;
        const taskId = event.dataTransfer.getData("text/plain");
        const targetStatus = column.dataset.status;
        const task = tasks.find((item) => String(item.id) === String(taskId));

        column.classList.remove("drop-target");

        if (!task || task.status === targetStatus) {
          return;
        }

        const previousStatus = task.status;
        task.status = targetStatus;
        boardErrorMessage = "";
        render();
        patchTaskStatus(taskId, targetStatus, previousStatus);
      }

      async function patchTaskStatus(id, status, previousStatus) {
        try {
          const response = await fetch(`${API_BASE}/tasks/${id}`, {
            method: "PATCH",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ status })
          });

          if (response.ok) {
            return;
          }

          const data = await response.json().catch(() => null);
          const message = data?.message || data?.error || `Request failed with status ${response.status}`;
          revertTaskStatus(id, previousStatus);
          boardErrorMessage = message;
          render();
        } catch (error) {
          console.error(error);
          revertTaskStatus(id, previousStatus);
          boardErrorMessage = "Unable to update task status. Please check your network connection and try again.";
          render();
        }
      }

      function revertTaskStatus(id, previousStatus) {
        const task = tasks.find((item) => String(item.id) === String(id));
        if (task) {
          task.status = previousStatus;
        }
      }

      function escapeHtml(value) {
        return String(value)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      /* Modal functions */
      let currentModalMode = "create";

      function openModal(task) {
        const overlay = document.getElementById("modalOverlay");
        const form = document.getElementById("taskForm");
        const modalTitle = document.getElementById("modalTitle");

        // Clear previous state
        clearModalErrors();
        form.reset();

        if (task) {
          // Edit mode
          currentModalMode = "edit";
          modalTitle.textContent = "Edit Task";
          document.getElementById("taskId").value = task.id || "";
          document.getElementById("taskTitle").value = task.title || "";
          document.getElementById("taskDescription").value = task.description || "";
          document.getElementById("taskStatus").value = task.status || "ToDo";
          document.getElementById("taskPriority").value = task.priority || "Low";
          document.getElementById("taskAssignee").value = task.assignee || "";
        } else {
          // Create mode
          currentModalMode = "create";
          modalTitle.textContent = "New Task";
          document.getElementById("taskId").value = "";
          document.getElementById("taskStatus").value = "ToDo";
          document.getElementById("taskPriority").value = "Low";
        }

        overlay.classList.add("open");
        document.getElementById("taskTitle").focus();
      }

      function closeModal() {
        const overlay = document.getElementById("modalOverlay");
        overlay.classList.remove("open");
        clearModalErrors();
        document.getElementById("taskForm").reset();
      }

      function handleOverlayClick(event) {
        if (event.target.id === "modalOverlay") {
          closeModal();
        }
      }

      function clearModalErrors() {
        document.getElementById("modalErrors").style.display = "none";
        document.getElementById("modalErrors").textContent = "";
        document.querySelectorAll(".form-error").forEach((el) => {
          el.textContent = "";
        });
      }

      async function submitTaskForm(event) {
        event.preventDefault();
        clearModalErrors();

        const title = document.getElementById("taskTitle").value.trim();
        const description = document.getElementById("taskDescription").value;
        const status = document.getElementById("taskStatus").value;
        const priority = document.getElementById("taskPriority").value;
        const assignee = document.getElementById("taskAssignee").value.trim();
        const taskId = document.getElementById("taskId").value;

        // Client-side validation
        if (!title) {
          document.getElementById("titleError").textContent = "Title is required";
          document.getElementById("taskTitle").focus();
          return;
        }

        const url = currentModalMode === "edit"
          ? `${API_BASE}/tasks/${taskId}`
          : `${API_BASE}/tasks`;

        const method = currentModalMode === "edit" ? "PATCH" : "POST";
        const payload = {
          title,
          description: description || "",
          status,
          priority,
          assignee: assignee || null
        };

        try {
          const response = await fetch(url, {
            method,
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
          });

          if (response.ok) {
            // Success: close modal and refresh board
            closeModal();
            fetchTasks();
            return;
          }

          if (response.status === 422) {
            // Validation error from server
            const data = await response.json().catch(() => ({}));

            if (data.detail) {
              // If detail is an array of validation errors
              if (Array.isArray(data.detail)) {
                data.detail.forEach((error) => {
                  const fieldName = error.loc?.[1];
                  const message = error.msg || "Invalid value";
                  if (fieldName && document.getElementById(`${fieldName}Error`)) {
                    document.getElementById(`${fieldName}Error`).textContent = message;
                  } else {
                    showModalError(message);
                  }
                });
              } else {
                showModalError(data.detail);
              }
            } else if (data.message) {
              showModalError(data.message);
            } else if (data.error) {
              showModalError(data.error);
            } else {
              showModalError("Validation failed. Please check your input.");
            }
            return;
          }

          // Other error responses
          const data = await response.json().catch(() => ({}));
          const message = data?.message || data?.error || `Request failed with status ${response.status}`;
          showModalError(message);
        } catch (error) {
          console.error(error);
          showModalError("Network error. Please check your connection and try again.");
        }
      }

      function showModalError(message) {
        const errorContainer = document.getElementById("modalErrors");
        errorContainer.textContent = message;
        errorContainer.style.display = "block";
      }

      // Handle Escape key to close modal
      document.addEventListener("keydown", (event) => {
        if (event.key === "Escape") {
          const overlay = document.getElementById("modalOverlay");
          if (overlay.classList.contains("open")) {
            closeModal();
          }
        }
      });

      document.addEventListener("DOMContentLoaded", fetchTasks);
    </script>
  </body>
</html>
